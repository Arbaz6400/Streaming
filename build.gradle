plugins {
    id 'java'
    id 'maven-publish'
}

group = 'org.enbd.streaming'
version = '1.0.0'   // 👈 base version, Jenkins pipeline will append suffix

repositories {
    mavenCentral()
}

dependencies {
    // Example dependency
    implementation 'com.google.guava:guava:32.1.2-jre'
    testImplementation 'junit:junit:4.13.2'
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            groupId = project.group
            artifactId = 'streaming-app'
            version = project.version
        }
    }
    repositories {
        maven {
            url = uri("https://nexus.yourcompany.com/repository/maven-releases/")
            credentials {
                username = project.findProperty("NEXUS_USERNAME") ?: "user"
                password = project.findProperty("NEXUS_PASSWORD") ?: "pass"
            }
        }
    }
}
